name: Scheduled Notifications

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  send-notifications:
    runs-on: ubuntu-latest
    steps:
      - name: Morning notifications
        run: |
          curl -sf -X GET "${{ secrets.APP_URL }}/api/cron/morning-notifications" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" || true

      - name: Evening notifications
        run: |
          curl -sf -X GET "${{ secrets.APP_URL }}/api/cron/evening-notifications" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" || true
