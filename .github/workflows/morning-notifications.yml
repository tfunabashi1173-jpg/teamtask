name: Morning Notifications

on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch:

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Call morning notifications endpoint
        run: |
          set -eu
          response_file=$(mktemp)
          status_code=$(
            curl -sS \
              -o "$response_file" \
              -w "%{http_code}" \
              -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
              "${{ secrets.APP_BASE_URL }}/api/cron/morning-notifications"
          )
          echo "HTTP_STATUS=$status_code"
          echo "RESPONSE_BODY_START"
          cat "$response_file"
          echo
          echo "RESPONSE_BODY_END"
          if [ "$status_code" -lt 200 ] || [ "$status_code" -ge 300 ]; then
            exit 1
          fi
